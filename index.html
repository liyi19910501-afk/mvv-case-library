<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MVV 案例库</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --surface: #ffffff;
      --surface-2: #f8fafb;
      --ink: #17201d;
      --text: #2e3834;
      --muted: #64716b;
      --line: #dce3e0;
      --line-strong: #c7d2ce;
      --teal: #0e6b5f;
      --teal-soft: #e4f2ef;
      --blue: #2f5f91;
      --blue-soft: #e7f0f8;
      --amber: #8b5d00;
      --amber-soft: #fff4d9;
      --red: #934132;
      --red-soft: #fae9e4;
      --shadow: 0 16px 42px rgba(23, 32, 29, 0.08);
      --radius: 8px;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.55;
    }

    a {
      color: var(--teal);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1440px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 56px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      min-height: 68px;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: #111;
      object-fit: cover;
    }

    .brand h1 {
      margin: 0;
      font-size: 21px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .top-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .meta-pill,
    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 12px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .search {
      width: 100%;
      height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .filter-button {
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }

    .filter-button.active {
      border-color: #9acac0;
      background: var(--teal-soft);
      color: var(--teal);
      font-weight: 800;
    }

    .workspace {
      display: grid;
      grid-template-columns: 292px minmax(0, 1fr) 300px;
      gap: 16px;
      margin-top: 16px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 14px;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .company-list {
      position: sticky;
      top: 84px;
      max-height: calc(100vh - 104px);
      overflow: auto;
    }

    .company-button {
      display: grid;
      gap: 6px;
      width: 100%;
      padding: 14px 16px;
      border: 0;
      border-bottom: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      text-align: left;
    }

    .company-button:last-child {
      border-bottom: 0;
    }

    .company-button:hover,
    .company-button.active {
      background: #f0f7f5;
    }

    .company-button.active {
      box-shadow: inset 4px 0 0 var(--teal);
    }

    .company-button strong {
      font-size: 15px;
      line-height: 1.2;
    }

    .company-button span {
      color: var(--muted);
      font-size: 12px;
    }

    .detail {
      min-width: 0;
    }

    .detail-hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      gap: 18px;
      padding: 24px;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
    }

    .company-heading {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
      min-width: 0;
    }

    .company-logo {
      display: block;
      width: auto;
      max-width: 132px;
      max-height: 46px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .company-title {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
      min-width: 0;
    }

    .company-subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .company-note {
      max-width: 760px;
      margin: 18px 0 0;
      color: var(--text);
      font-size: 15px;
    }

    .hero-meta {
      display: grid;
      gap: 8px;
      align-content: start;
      justify-items: end;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status.complete {
      background: var(--teal-soft);
      color: var(--teal);
    }

    .status.partial {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .status.narrative {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .status.review {
      background: var(--red-soft);
      color: var(--red);
    }

    .statement-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .statement {
      min-height: 220px;
      padding: 22px 24px;
      border-right: 1px solid var(--line);
    }

    .statement:last-child {
      border-right: 0;
    }

    .statement h3 {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .statement p {
      margin: 0;
      color: var(--ink);
      font-size: 17px;
      line-height: 1.55;
    }

    .statement .missing-statement {
      color: var(--muted);
    }

    .value-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .value-list li {
      margin: 0;
    }

    .statement .muted {
      color: var(--muted);
      font-size: 15px;
    }

    .context-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .context-block {
      padding: 22px 24px;
      border-right: 1px solid var(--line);
    }

    .context-block:last-child {
      border-right: 0;
    }

    .context-block h3 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 0;
    }

    .context-block p {
      margin: 0;
      color: var(--text);
      font-size: 14px;
    }

    .timeline {
      padding: 18px 24px 22px;
      border-top: 1px solid var(--line);
    }

    .timeline h3 {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0;
    }

    .timeline-list {
      display: grid;
      gap: 10px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 96px minmax(0, 1fr);
      gap: 12px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface-2);
      font-size: 13px;
    }

    .timeline-date {
      color: var(--muted);
      font-weight: 800;
      white-space: nowrap;
    }

    .timeline-main {
      min-width: 0;
    }

    .timeline-main strong {
      display: block;
      margin-bottom: 3px;
    }

    .timeline-main p {
      margin: 0;
      color: var(--text);
    }

    .candidate-list {
      display: grid;
      gap: 10px;
    }

    .candidate-item {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
    }

    .candidate-item strong {
      display: block;
      margin-bottom: 5px;
    }

    .candidate-item p {
      margin: 6px 0 0;
      color: var(--text);
    }

    .source-panel {
      position: sticky;
      top: 84px;
    }

    .evidence {
      padding: 14px;
    }

    .shot {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #eef2f3;
      object-fit: cover;
    }

    .shot-placeholder {
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 16 / 10;
      border: 1px dashed var(--line-strong);
      border-radius: 6px;
      background: #f7f9fa;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 16px;
    }

    .source-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .source-item {
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
    }

    .source-item span {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .official-links {
      display: grid;
      gap: 6px;
    }

    .source-item a {
      overflow-wrap: anywhere;
    }

    .compare {
      margin-top: 16px;
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .compare-table th,
    .compare-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
      text-align: left;
    }

    .compare-table th {
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .compare-table tr:last-child td {
      border-bottom: 0;
    }

    .compare-table .value-list {
      gap: 3px;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1120px) {
      .workspace {
        grid-template-columns: 260px minmax(0, 1fr);
      }

      .source-panel {
        position: static;
        grid-column: 1 / -1;
      }

      .evidence {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 14px;
      }

      .source-list {
        margin-top: 0;
      }
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 20px, 1440px);
      }

      .topbar,
      .toolbar,
      .detail-hero,
      .context-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }

      .top-meta,
      .filter-row,
      .hero-meta {
        justify-content: flex-start;
        justify-items: start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .company-list {
        position: static;
        max-height: none;
      }

      .statement-grid {
        grid-template-columns: 1fr;
      }

      .statement,
      .context-block {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .statement:last-child,
      .context-block:last-child {
        border-bottom: 0;
      }

      .timeline-item {
        grid-template-columns: 1fr;
      }

      .evidence {
        grid-template-columns: 1fr;
      }

      .compare {
        overflow-x: auto;
      }

      .compare-table {
        min-width: 760px;
      }
    }
  </style>
</head>

    <section class="workspace">

      <section class="panel detail" aria-live="polite">

        </div>

        <div class="statement-grid">

            <h3>Mission / Purpose</h3>
            <p id="missionText"></p>
          </article>
          <article class="statement">
            <h3>Vision / Aspiration</h3>
            <p id="visionText"></p>
          </article>
          <article class="statement">
            <h3>Values / Principles</h3>
            <p id="valuesText"></p>
          </article>
        </div>

        <div class="context-grid">
          <article class="context-block">
            <h3>相关表达</h3>
            <p id="otherText"></p>
          </article>
          <article class="context-block">
            <h3>研究判断</h3>
            <p id="researchText"></p>
          </article>
        </div>

        <div class="timeline">
          <h3>版本时间线</h3>
          <div class="timeline-list" id="timelineList"></div>
        </div>

        <div class="timeline">
          <h3>历史候选来源</h3>
          <div class="candidate-list" id="candidateList"></div>
        </div>
      </section>

      <aside class="panel source-panel" aria-label="证据与来源">
        <div class="panel-head">
          <h2>证据与来源</h2>
        </div>
        <div class="evidence">
          <div id="evidenceVisual"></div>
          <div class="source-list">
            <div class="source-item">
              <span>官方来源</span>
              <div class="official-links" id="officialLinks"></div>
            </div>
            <div class="source-item">
              <span>本地档案</span>
              <a id="profileLink" href="#"></a>
            </div>
            <div class="source-item">
              <span>版本记录</span>
              <a id="versionLink" href="#"></a>
            </div>
          </div>
        </div>
      </aside>
    </section>

    <section class="panel compare" aria-label="横向对照">
      <div class="panel-head">
        <h2>横向对照</h2>
        <span class="count">Mission / Vision / Values</span>
      </div>
      <table class="compare-table">
        <thead>
          <tr>
            <th>企业</th>
            <th>表达类型</th>
            <th>Mission</th>
            <th>Vision</th>
            <th>Values</th>
          </tr>
        </thead>
        <tbody id="compareRows"></tbody>
      </table>
    </section>
  </main>

    const listEl = document.querySelector("#companyList");
    const compareRows = document.querySelector("#compareRows");
    const searchInput = document.querySelector("#searchInput");
    const filterButtons = [...document.querySelectorAll(".filter-button")];
    const visibleCount = document.querySelector("#visibleCount");
    let activeFilter = "all";
    let selectedId = "ikea";

    function statusClass(type) {
      if (type === "complete") return "complete";
      if (type === "partial") return "partial";
      if (type === "review") return "review";
      return "partial";
    }

    function visibleCompanies() {
      const keyword = searchInput.value.trim().toLowerCase();
      return companies.filter(company => {
        const filterMatch = activeFilter === "all" || company.type === activeFilter;
        const text = [
          company.name,
          company.en,
          company.region,
          company.industry,
          company.typeLabel,
          company.mission,
          company.vision,
          company.values,
          company.other,
          company.research
        ].join(" ").toLowerCase();
        return filterMatch && (!keyword || text.includes(keyword));
      });
    }

    function setText(id, value) {
      document.querySelector(id).textContent = value || "未记录";
    }

    function normalizeStatement(value) {
      const raw = String(value || "").trim().replace(/\\"/g, "\"");
      const explicit = raw.match(/页面明确写出[:：]\s*([\s\S]+)$/);
      return (explicit ? explicit[1] : raw).trim();
    }

    function isMissingStatement(value) {
      const text = normalizeStatement(value);
      if (!text) return true;
      return [
        "未单列",
        "未明确",
        "未找到",
        "未提供独立",
        "空缺字段",
        "不做推断"
      ].some(pattern => text.includes(pattern));
    }

    function splitValues(value) {
      return normalizeStatement(value)
        .split(/\r?\n|；|;/)
        .map(item => item.replace(/^-+\s*/, "").trim())
        .filter(Boolean);
    }

    function statementHtml(value, options = {}) {
      if (isMissingStatement(value)) return `<span class="missing-statement">/</span>`;
      if (options.values) {
        const items = splitValues(value);
        if (items.length > 1) {
          return `<ul class="value-list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
        }
        return escapeHtml(items[0] || normalizeStatement(value));
      }
      return escapeHtml(normalizeStatement(value));
    }

    function setStatement(id, value, options = {}) {
      const element = document.querySelector(id);
      element.innerHTML = statementHtml(value, options);
      element.classList.toggle("missing-statement", isMissingStatement(value));
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function sourceLabel(source) {
      const url = source?.url || source || "";
      if (source?.title) return source.title;
      try {
        const parsed = new URL(url);
        const path = parsed.pathname.replace(/\/$/, "");
        return `${parsed.hostname}${path && path !== "/" ? path : ""}`;
      } catch {
        return url || "未记录";
      }
    }

    function renderOfficialSources(company) {
      const officialLinks = document.querySelector("#officialLinks");
      const sources = (company.officialSources || [])
        .filter(source => source?.url)
        .slice(0, 4);

      const fallback = company.source ? [{ url: company.source, title: company.sourceTitle || "" }] : [];
      const visibleSources = sources.length ? sources : fallback;

      officialLinks.innerHTML = visibleSources.length
        ? visibleSources.map(source => `
          <a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">${escapeHtml(sourceLabel(source))}</a>
        `).join("")
        : `<span class="missing-statement">/</span>`;
    }

    function renderTimeline(company) {
      const timeline = document.querySelector("#timelineList");
      const history = company.history || [];
      timeline.innerHTML = history.length ? history.slice().reverse().map(item => `
        <div class="timeline-item">
          <div class="timeline-date">${escapeHtml(item.date)}</div>
          <div class="timeline-main">
            <strong>${escapeHtml(item.changeType || "record")} · ${escapeHtml(item.classification || company.classification || company.typeLabel)}</strong>
            <p>${escapeHtml(item.note || "已记录版本，点击查看详情。")}</p>
            <a href="${escapeHtml(item.file)}" target="_blank" rel="noreferrer">查看版本记录</a>
          </div>
        </div>
      `).join("") : `<div class="empty">暂无版本记录。</div>`;
    }

    function renderCandidates(company) {
      const candidateList = document.querySelector("#candidateList");
      const candidates = company.candidates || [];
      candidateList.innerHTML = candidates.length ? candidates.slice().reverse().map(item => {
        const mainText = item.raw_mission || item.raw_values || item.raw_vision || "待人工摘录";
        return `
          <div class="candidate-item">
            <strong>${escapeHtml(item.published_date || item.found_at || "待定日期")} · ${escapeHtml(item.source_level || "未分级")} · ${escapeHtml(item.source_type || "source")}</strong>
            <a href="${escapeHtml(item.source_url)}" target="_blank" rel="noreferrer">${escapeHtml(item.source_title || item.candidate_id)}</a>
            <p>${escapeHtml(mainText)}</p>
            <p>建议动作：${escapeHtml(item.recommended_action || "needs_more_sources")} · 状态：${escapeHtml(item.status || "candidate")}</p>
          </div>
        `;
      }).join("") : `<div class="empty">暂无历史候选来源。</div>`;
    }

    function selectCompany(id) {
      selectedId = id;
      const company = companies.find(item => item.id === selectedId) || companies[0];
      const logo = document.querySelector("#companyLogo");
      if (company.logo) {
        logo.src = company.logo;
        logo.alt = `${company.name} logo`;
        logo.hidden = false;
      } else {
        logo.removeAttribute("src");
        logo.alt = "";
        logo.hidden = true;
      }

      setText("#companyTitle", company.name);
      setText("#companySubtitle", `${company.en} · ${company.region} · ${company.industry}`);
      setText("#companyNote", company.research);
      setStatement("#missionText", company.mission);
      setStatement("#visionText", company.vision);
      setStatement("#valuesText", company.values, { values: true });
      setText("#otherText", company.other);
      setText("#researchText", company.research);
      setText("#reviewedAt", `确认日期 ${company.reviewed}`);
      setText("#confidence", `可信度 ${company.confidence}`);

      const status = document.querySelector("#statusBadge");
      status.textContent = company.typeLabel;
      status.className = `status ${statusClass(company.type)}`;

      renderOfficialSources(company);

      const profile = document.querySelector("#profileLink");
      profile.href = company.profile;
      profile.textContent = company.profile;

      const version = document.querySelector("#versionLink");
      version.href = company.version;
      version.textContent = company.version || "暂无版本记录";
      version.toggleAttribute("aria-disabled", !company.version);

      const visual = document.querySelector("#evidenceVisual");
      visual.innerHTML = company.evidence
        ? `<img class="shot" src="${company.evidence}" alt="${company.name} 官方页面证据截图">`
        : `<div class="shot-placeholder">该条目暂未留存截图<br>请以官方来源与版本记录为准</div>`;

      renderTimeline(company);
      renderCandidates(company);

      document.querySelectorAll(".company-button").forEach(button => {
        button.classList.toggle("active", button.dataset.id === selectedId);
      });
    }

    function render() {
      const list = visibleCompanies();
      visibleCount.textContent = `${list.length}`;
      if (!list.some(company => company.id === selectedId) && list.length) {
        selectedId = list[0].id;
      }

      listEl.innerHTML = list.length ? list.map(company => `
        <button class="company-button ${company.id === selectedId ? "active" : ""}" type="button" data-id="${escapeHtml(company.id)}">
          <strong>${escapeHtml(company.name)}</strong>
          <span>${escapeHtml(company.en)} · ${escapeHtml(company.typeLabel)}</span>
        </button>
      `).join("") : `<div class="empty">没有匹配的企业。</div>`;

      compareRows.innerHTML = list.map(company => `
        <tr>
          <td><a href="#" data-compare-id="${escapeHtml(company.id)}">${escapeHtml(company.name)}</a><br><span class="tag">${escapeHtml(company.en)}</span></td>
          <td><span class="status ${statusClass(company.type)}">${escapeHtml(company.typeLabel)}</span></td>
          <td>${statementHtml(company.mission)}</td>
          <td>${statementHtml(company.vision)}</td>
          <td>${statementHtml(company.values, { values: true })}</td>
        </tr>
      `).join("");

      document.querySelectorAll(".company-button").forEach(button => {
        button.addEventListener("click", () => selectCompany(button.dataset.id));
      });
      document.querySelectorAll("[data-compare-id]").forEach(link => {
        link.addEventListener("click", event => {
          event.preventDefault();
          selectCompany(link.dataset.compareId);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });

      if (list.length) {
        selectCompany(selectedId);
      }
    }

    filterButtons.forEach(button => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach(item => item.classList.toggle("active", item === button));
        render();
      });
    });

    searchInput.addEventListener("input", render);
    render();
  </script>
