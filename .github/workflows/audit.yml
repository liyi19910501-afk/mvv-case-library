name: Audit MVV data

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check scripts
        run: npm run check

      - name: Rebuild data
        run: npm run sync

      - name: Validate frontend data loading
        run: npm run build

      - name: Audit data
        run: npm run audit:strict
